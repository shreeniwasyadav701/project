<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Amazon Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="navbar">
        <img src="amazon.jpeg" class="logo">
        <input type="text" placeholder="Search Amazon">
        <button>Search</button>
    </div>

    <div class="hero">
        <img src="hero.jpeg"alt="Banner"></div>

    <div class="products">

        <div class="box">
            <img src="laptop.jpeg">
            <h3>Laptop</h3>
        </div>

        <div class="box">
            <img src="Mobile.jpeg">
            <h3>Mobile</h3>
        </div>

        <div class="box">
            <img src="headphones.jpeg">
            <h3>Headphones</h3>
        </div>

        <div class="box">
            <img src="shoe.jpeg">
            <h3>Shoes</h3>
        </div>

        <div class="box">
            <img src="T-shart.jpeg">
            <h3>T-Shirt</h3>
        </div>

        <div class="box">
            <img src="chair.jpeg">
            <h3>Chair</h3>
        </div>

        <div class="box">
            <img src="perfume.jpg">
            <h3>Perfume</h3>
        </div>

        <div class="box">
            <img src="watch.jpeg">
            <h3>Watch</h3>
        </div>

    </div>

    <footer>
        <p>© 2026 Amazon Clone</p>
    </footer>

</body>
</html>
